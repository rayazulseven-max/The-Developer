<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ray Azul Perez | Clinical Search Engine</title>
    <style>
        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; 
            background-color: #030303; 
            color: #ffffff; 
            margin: 0; 
            display: flex; 
            height: 100vh; 
            overflow: hidden; 
            -webkit-user-select: none;
            user-select: none;
        }

        /* Sidebar Navigation */
        .sidebar {
            width: 280px;
            background-color: #0f0f0f;
            border-right: 1px solid #272727;
            padding: 30px 20px;
            display: flex;
            flex-direction: column;
            gap: 25px;
            overflow-y: auto;
            z-index: 100;
        }

        .brand-logo-text {
            color: #ffffff;
            margin: 0 0 5px 0;
            font-size: 1.2rem;
            font-weight: 800;
            letter-spacing: 2px;
            text-transform: uppercase;
        }
        
        .developer-tag { font-size: 0.8em; color: #415a77; margin: 0; letter-spacing: 1px; font-weight: bold; }
        
        .sidebar-link {
            color: #aaaaaa;
            text-decoration: none;
            font-weight: bold;
            font-size: 0.9em;
            transition: color 0.2s;
            display: inline-block;
            margin-bottom: 10px;
        }
        .sidebar-link:hover { color: #ffffff; }

        /* Search & Filters */
        .search-container {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        input[type="text"] { 
            padding: 14px; font-size: 15px; border: 1px solid #333; border-radius: 8px; 
            background: #1a1a1a; color: #fff; outline: none; width: 100%; box-sizing: border-box;
            font-family: monospace;
        }
        input[type="text"]:focus { border-color: #415a77; }
        input[type="text"] { user-select: text; -webkit-user-select: text; }

        .category-title { font-size: 0.8em; color: #888; text-transform: uppercase; font-weight: bold; margin-bottom: 5px; border-bottom: 1px solid #222; padding-bottom: 5px;}
        
        .cat-btn { 
            background: transparent; color: #aaa; border: 1px solid #333; border-radius: 6px; 
            padding: 10px 15px; font-size: 0.85em; cursor: pointer; transition: all 0.2s; text-align: left;
            width: 100%; margin-bottom: 8px; font-weight: bold;
        }
        .cat-btn:hover { background: #1a1a1a; border-color: #555; }
        .cat-btn.active { background: rgba(65, 90, 119, 0.15); color: #8bb4e5; border-color: #415a77; }

        /* Main Content Area */
        .main-view { 
            flex: 1; padding: 40px; overflow-y: auto; background-color: #050505;
        }

        .header-stats {
            display: flex; justify-content: space-between; align-items: center;
            border-bottom: 1px solid #272727; padding-bottom: 15px; margin-bottom: 30px;
        }
        
        .result-count { font-size: 0.9em; color: #aaaaaa; font-weight: bold; letter-spacing: 1px; }

        /* Clinical Data Grid */
        .data-grid { 
            display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 20px; 
        }

        .code-card {
            background: linear-gradient(145deg, #111, #0a0a0a);
            border: 1px solid #222; 
            border-radius: 10px;
            padding: 25px; 
            display: flex; 
            flex-direction: column; 
            gap: 12px;
            transition: transform 0.2s, border-color 0.2s;
            position: relative; /* REQUIRED FOR THE WATERMARK */
            overflow: hidden; /* Keeps the watermark inside the card */
            z-index: 1;
        }

        .code-card:hover { transform: translateY(-4px); border-color: #415a77; }

        /* --- THE CLINICAL WATERMARK --- */
        .code-card::after {
            content: "";
            position: absolute;
            bottom: -15px; /* Tucks it slightly off the bottom edge */
            right: -15px; /* Tucks it slightly off the right edge */
            width: 120px;
            height: 120px;
            background-image: url('logo/Azul.png');
            background-size: contain;
            background-repeat: no-repeat;
            opacity: 0.05; /* VERY FAINT - Just a ghost of a stamp */
            z-index: -1; /* Keeps it behind the text */
            pointer-events: none;
        }

        .card-header { display: flex; justify-content: space-between; align-items: flex-start; }
        .hcpcs-code { font-size: 1.8rem; font-weight: 900; color: #8bb4e5; font-family: monospace; letter-spacing: 2px; margin: 0; }
        .category-badge { background: #222; color: #aaa; font-size: 0.7rem; padding: 4px 8px; border-radius: 4px; text-transform: uppercase; font-weight: bold; letter-spacing: 1px;}
        
        .description { font-size: 0.95rem; color: #ddd; line-height: 1.5; margin: 0; }
        
        .price { font-size: 1.1rem; color: #55aa77; font-weight: bold; margin: 0; }
        
        .tags-container { display: flex; flex-wrap: wrap; gap: 6px; margin-top: auto; padding-top: 15px; border-top: 1px dashed #222; }
        .layman-tag { font-size: 0.75rem; color: #666; background: #151515; padding: 3px 8px; border-radius: 12px; border: 1px solid #222;}

        /* Scrollbars */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #333; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #555; }

        /* --- Floating Chatbot UI --- */
        #chatbotToggle {
            position: fixed;
            bottom: 30px;
            right: 30px;
            background-color: #415a77;
            color: white;
            border: none;
            border-radius: 30px;
            padding: 15px 25px;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
            z-index: 1000;
            transition: background 0.3s;
        }
        #chatbotToggle:hover { background-color: #5a7b9e; }

        #chatbotWindow {
            display: none;
            position: fixed;
            bottom: 90px;
            right: 30px;
            width: 350px;
            background: linear-gradient(145deg, #111, #0a0a0a);
            border: 1px solid #333;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.7);
            flex-direction: column;
            z-index: 1000;
            overflow: hidden;
        }

        #chatHeader {
            background-color: #1a222c;
            padding: 15px;
            font-weight: bold;
            color: #8bb4e5;
            display: flex;
            justify-content: space-between;
            border-bottom: 1px solid #333;
        }

        #chatHistory {
            height: 300px;
            padding: 15px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 10px;
            font-size: 0.9rem;
        }

        .chat-msg { padding: 10px 15px; border-radius: 8px; max-width: 80%; line-height: 1.4; }
        .user-msg { background-color: #415a77; color: white; align-self: flex-end; border-bottom-right-radius: 2px; }
        .bot-msg { background-color: #222; color: #ddd; align-self: flex-start; border-bottom-left-radius: 2px; border: 1px solid #333; }

        #chatInputArea {
            display: flex;
            padding: 10px;
            border-top: 1px solid #333;
            background-color: #0f0f0f;
        }

        #chatInputArea input {
            flex: 1;
            padding: 10px;
            border-radius: 6px;
            border: 1px solid #333;
            background: #1a1a1a;
            color: white;
            outline: none;
            margin-right: 10px;
        }
        
        #chatInputArea button {
            background-color: #415a77;
            color: white;
            border: none;
            padding: 10px 15px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
        }
        #chatInputArea button:hover { background-color: #5a7b9e; }
        /* 📱 Mobile Adjustments */
        @media (max-width: 900px) {
            body { 
                flex-direction: column; 
                overflow-y: auto; /* Lets the whole page scroll naturally */
                height: auto; 
            }
            
            .sidebar { 
                width: 100%; 
                height: auto; 
                border-right: none; 
                border-bottom: 1px solid #272727; 
                padding: 20px; 
                box-sizing: border-box; 
                overflow: visible;
            }
            
            .main-view { 
                padding: 20px 20px 100px 20px; /* Extra bottom padding so chat bot doesn't cover content */
                overflow-y: visible; 
            }
            
            .header-stats {
                flex-direction: column;
                align-items: flex-start;
                gap: 10px;
            }
            
            .data-grid { 
                grid-template-columns: 1fr; /* Forces 1 clean column on mobile */
            }
            
            /* Chatbot Mobile Fixes */
            #chatbotWindow {
                width: calc(100% - 40px); /* Keeps it from touching the edges */
                right: 20px;
                left: 20px;
                bottom: 80px;
                max-width: 400px;
                margin: 0 auto; /* Centers it perfectly */
            }
            
            #chatbotToggle {
                bottom: 20px;
                right: 20px;
            }
        }

    </style>
</head>
<body>

<div class="sidebar">
    <div style="display: flex; align-items: center; gap: 15px; margin-bottom: 10px;">
        <img src="logo/Azul.png" alt="Azul Sentinel" style="width: 45px; height: auto; filter: drop-shadow(0 0 8px rgba(65, 90, 119, 0.6));">
        <div>
            <h2 class="brand-logo-text" style="margin: 0; font-size: 1.1rem;">RAY AZUL PEREZ</h2>
            <p class="developer-tag" style="margin: 2px 0 0 0; font-size: 0.7rem;">Clinical Intelligence Engine</p>
        </div>
    </div>
    
    <div style="display: flex; flex-direction: column; gap: 10px; margin-top: -10px; margin-bottom: 15px;">
        <a href="index.html" class="sidebar-link" style="color: #415a77;">Back to Landing →</a>
        <a href="https://github.com/rayazulseven-max" class="sidebar-link" target="_blank">View GitHub Profile ↗</a>
        <a href="https://www.linkedin.com/in/ray-azul-dev/" class="sidebar-link" target="_blank">View LinkedIn Profile ↗</a>
    </div>
    
    <div class="search-container">
        <input type="text" id="searchBar" placeholder="Search Code, Term, or Supply..." onkeyup="filterDatabase()">
    </div>
    
    <div>
        <div class="category-title">Taxonomy Filter</div>
        <div id="categoryFilters">
            <button class="cat-btn active" onclick="setCategory('All', this)">All Codes</button>
            <button class="cat-btn" onclick="setCategory('DME', this)">Durable Medical Eq. (DME)</button>
            <button class="cat-btn" onclick="setCategory('Drugs', this)">Injectable Drugs (J-Codes)</button>
            <button class="cat-btn" onclick="setCategory('Orthotics', this)">Orthotics / Prosthetics</button>
            <button class="cat-btn" onclick="setCategory('Supplies', this)">Medical Supplies</button>
        </div>
    </div>
</div>

<div class="main-view">
    <div class="header-stats">
        <h2 style="margin:0; font-size: 1.5rem; letter-spacing: 1px;">HCPCS Level II Explorer</h2>
        <div id="resultCount" class="result-count">LOADING DATABASE...</div>
    </div>
    
    <div id="dataGrid" class="data-grid">
        </div>
</div>
<button id="chatbotToggle" onclick="toggleChat()">💬 Ask Clinical Bot</button>

<div id="chatbotWindow">
    <div id="chatHeader">
        <div style="display: flex; align-items: center; gap: 10px;">
            <img src="logo/Azul.png" alt="Bot Icon" style="width: 20px; height: 20px; object-fit: contain;">
            <span>Azul Clinical AI</span>
        </div>
        <span style="cursor:pointer; color: #aaa;" onclick="toggleChat()">✖</span>
    </div>
    <div id="chatHistory">
        <div class="chat-msg bot-msg">System Active. Enter a supply description or HCPCS code (e.g., "walker with wheels" or "E0143").</div>
    </div>
    <div id="chatInputArea">
        <input type="text" id="chatInput" placeholder="Query database..." onkeypress="handleChatEnter(event)">
        <button onclick="sendChatMessage()">Search</button>
    </div>
</div>
<script>
    let hcpcsData = [];
    let currentCategory = 'All';

    // Fetch the JSON database
    document.addEventListener("DOMContentLoaded", () => {
        fetch('hcpcs.json')
            .then(response => response.json())
            .then(data => {
                hcpcsData = data;
                filterDatabase(); // Initial render
            })
            .catch(error => {
                console.error("Error loading HCPCS data:", error);
                document.getElementById('resultCount').innerText = "DATABASE ERROR";
            });
    });

    // Handle Category Buttons
    function setCategory(category, btnElement) {
        currentCategory = category;
        document.querySelectorAll('.cat-btn').forEach(btn => btn.classList.remove('active'));
        btnElement.classList.add('active');
        filterDatabase();
    }

    // Core Filtering Logic
    function filterDatabase() {
        const query = document.getElementById('searchBar').value.toLowerCase().trim();
        const grid = document.getElementById('dataGrid');
        grid.innerHTML = '';

        const filteredCodes = hcpcsData.filter(item => {
            // 1. Check Category
            const matchesCategory = (currentCategory === 'All') || (item.category === currentCategory);
            if (!matchesCategory) return false;

            // 2. Check Search Query (Matches Code, Description, or Layman Tags)
            if (query === '') return true;

            const codeMatch = item.code.toLowerCase().includes(query);
            const descMatch = item.description.toLowerCase().includes(query);
            const tagMatch = item.tags && item.tags.some(tag => tag.toLowerCase().includes(query));

            return codeMatch || descMatch || tagMatch;
        });

        // Update UI Count
        document.getElementById('resultCount').innerText = `${filteredCodes.length} CODES FOUND`;

        // Render Cards
        filteredCodes.forEach(item => {
            const card = document.createElement('div');
            card.className = 'code-card';
            
            // Format Price
            const formattedPrice = item.price_estimate > 0 ? `$${item.price_estimate.toFixed(2)}` : 'Pricing Varies';
            
            // Format Tags
            let tagsHTML = '';
            if (item.tags) {
                tagsHTML = item.tags.map(tag => `<span class="layman-tag">${tag}</span>`).join('');
            }

            card.innerHTML = `
                <div class="card-header">
                    <h3 class="hcpcs-code">${item.code}</h3>
                    <span class="category-badge">${item.category}</span>
                </div>
                <p class="description">${item.description}</p>
                <p class="price">${formattedPrice}</p>
                <div class="tags-container">
                    ${tagsHTML}
                </div>
            `;
            grid.appendChild(card);
        });
    }
    // --- Chatbot Logic ---
    function toggleChat() {
        const chatWin = document.getElementById('chatbotWindow');
        chatWin.style.display = chatWin.style.display === 'flex' ? 'none' : 'flex';
    }

    function handleChatEnter(e) {
        if (e.key === 'Enter') sendChatMessage();
    }

    async function sendChatMessage() {
        const inputField = document.getElementById('chatInput');
        const message = inputField.value.trim();
        if (!message) return;

        const chatHistory = document.getElementById('chatHistory');
        
        // Append User Message
        chatHistory.innerHTML += `<div class="chat-msg user-msg">${message}</div>`;
        inputField.value = '';
        chatHistory.scrollTop = chatHistory.scrollHeight;

        // Add loading indicator
        const loadingId = 'loading-' + Date.now();
        chatHistory.innerHTML += `<div id="${loadingId}" class="chat-msg bot-msg">Querying clinical database...</div>`;
        chatHistory.scrollTop = chatHistory.scrollHeight;

        try {
            // THE SECRET HANDSHAKE: Notice the &context=medical parameter
            const response = await fetch(`https://the-developer-hs1s.onrender.com/chat?query=${encodeURIComponent(message)}&context=medical`);
            const data = await response.json();
            
            // Remove loading indicator & append Bot Response
            document.getElementById(loadingId).remove();
            chatHistory.innerHTML += `<div class="chat-msg bot-msg">${data.response}</div>`;
        } catch (error) {
            document.getElementById(loadingId).remove();
            chatHistory.innerHTML += `<div class="chat-msg bot-msg" style="color: #ff6666;">Error: Could not connect to the clinical server.</div>`;
        }
        
        chatHistory.scrollTop = chatHistory.scrollHeight;
    }
</script>

</body>
</html>
